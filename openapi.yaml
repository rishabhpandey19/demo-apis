openapi: 3.1.0

info:
  title: LogForge API
  version: 1.0.0
  description: |
    On-demand log and resource scenario generator.

    Fire realistic structured log events — server errors, DB failures, auth issues,
    CPU spikes, OOM kills — via REST. Every fired event is stored in an in-memory
    store (circular buffer, 10 000 entries) and queryable by time range, level,
    category, scenario, or free-text search.

    ## Quick start
    ```bash
    # Fire a scenario
    curl -X POST /api/logs/generate \
      -H "Content-Type: application/json" \
      -d '{"scenario":"db_down"}'

    # Query the last hour of errors
    curl "/api/query?level=ERROR"

    # Time-series chart data (per-minute buckets)
    curl "/api/query/timeseries?bucket=60"
    ```
  contact:
    name: LogForge
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://your-domain.com
    description: Production (Dokploy)

tags:
  - name: health
    description: Service health
  - name: logs
    description: Scenario generation — fire app and resource log events
  - name: query
    description: Query and aggregate stored log entries

# ─── Reusable components ────────────────────────────────────────────────────

components:
  parameters:
    from:
      name: from
      in: query
      description: Range start — ISO 8601 string or Unix ms. Defaults to 1 hour ago.
      schema:
        type: string
        examples:
          iso: { value: "2024-01-15T10:00:00Z" }
          ms:  { value: "1705312800000" }

    to:
      name: to
      in: query
      description: Range end — ISO 8601 string or Unix ms. Defaults to now.
      schema:
        type: string
        example: "2024-01-15T11:00:00Z"

    level:
      name: level
      in: query
      description: Filter by log level.
      schema:
        $ref: '#/components/schemas/Level'

    category:
      name: category
      in: query
      description: Filter by event category.
      schema:
        $ref: '#/components/schemas/Category'

    scenario:
      name: scenario
      in: query
      description: Filter by exact scenario id.
      schema:
        type: string
        example: auth_error

    search:
      name: search
      in: query
      description: Case-insensitive substring match against message and serialised meta.
      schema:
        type: string
        example: ECONNREFUSED

    limit:
      name: limit
      in: query
      description: Maximum number of entries to return. Hard cap 1000.
      schema:
        type: integer
        default: 200
        minimum: 1
        maximum: 1000

    offset:
      name: offset
      in: query
      description: Pagination offset.
      schema:
        type: integer
        default: 0
        minimum: 0

    order:
      name: order
      in: query
      description: Sort order by timestamp.
      schema:
        type: string
        enum: [asc, desc]
        default: desc

  schemas:
    Level:
      type: string
      enum: [INFO, WARN, ERROR, CRITICAL]
      example: ERROR

    Category:
      type: string
      enum: [APP, RESOURCE]
      example: APP

    AppScenario:
      type: string
      enum:
        - server_error
        - db_down
        - auth_error
        - user_blocked
        - rate_limit
        - payment_fail
        - cache_miss
        - slow_query
        - third_party_down
        - disk_full
        - service_start
        - user_login
      example: db_down

    ResourceScenario:
      type: string
      enum:
        - high_cpu
        - cpu_critical
        - low_memory
        - oom_kill
        - disk_io_saturation
        - network_saturation
        - thread_leak
        - gc_pause
        - memory_leak
      example: high_cpu

    StoredRef:
      type: object
      description: Reference to the entry written to the in-memory store.
      required: [id, ts]
      properties:
        id:
          type: string
          format: uuid
          example: "a3f1c2d4-1234-5678-abcd-ef0123456789"
        ts:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00.000Z"

    LogEntry:
      type: object
      required: [id, ts, tsMs, level, category, scenario, message, meta]
      properties:
        id:
          type: string
          format: uuid
        ts:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00.000Z"
        tsMs:
          type: integer
          description: Unix timestamp in milliseconds
          example: 1705315800000
        level:
          $ref: '#/components/schemas/Level'
        category:
          $ref: '#/components/schemas/Category'
        scenario:
          type: string
          example: db_down
        message:
          type: string
          example: "Database connection failed — all retries exhausted"
        meta:
          type: object
          description: Scenario-specific structured metadata
          additionalProperties: true

    ErrorResponse:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          example: "Invalid 'from' value: not-a-date"

    GenerateRequest:
      type: object
      required: [scenario]
      properties:
        scenario:
          oneOf:
            - $ref: '#/components/schemas/AppScenario'
            - $ref: '#/components/schemas/ResourceScenario'

    BurstRequest:
      type: object
      properties:
        count:
          type: integer
          description: Number of scenarios to fire. Capped at the pool size.
          default: 5
          minimum: 1
          maximum: 21
          example: 5
        category:
          $ref: '#/components/schemas/Category'

# ─── Paths ──────────────────────────────────────────────────────────────────

paths:

  # ── Health ────────────────────────────────────────────────────────────────

  /health:
    get:
      tags: [health]
      summary: Health check
      description: Returns service uptime and current in-memory store size.
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, uptime, ts, store]
                properties:
                  status:
                    type: string
                    example: ok
                  uptime:
                    type: integer
                    description: Process uptime in seconds
                    example: 3600
                  ts:
                    type: string
                    format: date-time
                  store:
                    type: object
                    properties:
                      size:
                        type: integer
                        example: 42
                      max:
                        type: integer
                        example: 10000

  # ── Logs — scenario generation ────────────────────────────────────────────

  /api/logs/scenarios:
    get:
      tags: [logs]
      summary: List all available scenarios
      description: Returns all scenario ids grouped by category.
      operationId: listScenarios
      responses:
        '200':
          description: Scenario lists
          content:
            application/json:
              schema:
                type: object
                required: [app, resource]
                properties:
                  app:
                    type: array
                    items:
                      $ref: '#/components/schemas/AppScenario'
                  resource:
                    type: array
                    items:
                      $ref: '#/components/schemas/ResourceScenario'
              example:
                app: [server_error, db_down, auth_error, user_blocked, rate_limit,
                      payment_fail, cache_miss, slow_query, third_party_down,
                      disk_full, service_start, user_login]
                resource: [high_cpu, cpu_critical, low_memory, oom_kill,
                           disk_io_saturation, network_saturation, thread_leak,
                           gc_pause, memory_leak]

  /api/logs/snapshot:
    get:
      tags: [logs]
      summary: Live resource snapshot
      description: |
        Captures real system metrics from the Node.js process and OS
        (`os` + `process` modules). Writes an INFO entry to the store.
      operationId: getSnapshot
      responses:
        '200':
          description: Live system metrics
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      requestId:        { type: string, format: uuid }
                      totalMb:          { type: integer, example: 16384 }
                      usedMb:           { type: integer, example: 6820 }
                      freeMb:           { type: integer, example: 9564 }
                      usedPercent:      { type: integer, example: 42 }
                      loadAvg:          { type: array, items: { type: number }, example: [1.2, 0.9, 0.8] }
                      uptimeSec:        { type: integer, example: 86400 }
                      processUptimeSec: { type: integer, example: 3600 }
                      heapUsedMb:       { type: integer, example: 48 }
                      heapTotalMb:      { type: integer, example: 64 }
                      rssMb:            { type: integer, example: 72 }
                      platform:         { type: string, example: linux }
                      nodeVersion:      { type: string, example: v20.11.0 }

  /api/logs/generate:
    post:
      tags: [logs]
      summary: Fire a single scenario
      description: |
        Executes the named scenario, writes a structured log via Winston,
        stores the entry in the in-memory store, and returns the generated metadata.

        **App scenarios** simulate application-level events (HTTP errors, DB failures, auth issues).
        **Resource scenarios** simulate infrastructure events (CPU spikes, OOM, disk saturation).
      operationId: generateLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
            examples:
              db_down:
                summary: Database connection failure
                value: { scenario: db_down }
              high_cpu:
                summary: CPU spike
                value: { scenario: high_cpu }
              auth_error:
                summary: Auth failure
                value: { scenario: auth_error }
      responses:
        '200':
          description: Scenario fired successfully
          content:
            application/json:
              schema:
                type: object
                required: [ok, scenario, category, generated, stored]
                properties:
                  ok:
                    type: boolean
                    example: true
                  scenario:
                    type: string
                    example: db_down
                  category:
                    type: string
                    enum: [app, resource]
                    example: app
                  generated:
                    type: object
                    description: Scenario-specific structured metadata
                    additionalProperties: true
                  stored:
                    $ref: '#/components/schemas/StoredRef'
              example:
                ok: true
                scenario: db_down
                category: app
                generated:
                  requestId: "a3f1c2d4-1234-5678-abcd-ef0123456789"
                  host: db.internal
                  port: 5432
                  attempt: 3
                  maxAttempts: 3
                  error: ECONNREFUSED
                  timeoutMs: 5000
                stored:
                  id: "b2e3d4f5-5678-1234-efab-cd0123456789"
                  ts: "2024-01-15T10:30:00.000Z"
        '400':
          description: Unknown scenario
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unknown scenario
                  available:
                    type: object
                    properties:
                      app:      { type: array, items: { type: string } }
                      resource: { type: array, items: { type: string } }

  /api/logs/burst:
    post:
      tags: [logs]
      summary: Fire multiple random scenarios
      description: |
        Randomly selects and fires `count` scenarios from the specified category pool
        (or the full pool if no category given). All results are stored.
      operationId: burstLogs
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BurstRequest'
            examples:
              mixed:
                summary: 5 mixed scenarios
                value: { count: 5 }
              app_only:
                summary: 3 app-only scenarios
                value: { count: 3, category: APP }
              resource_only:
                summary: 4 resource-only scenarios
                value: { count: 4, category: RESOURCE }
      responses:
        '200':
          description: Burst completed
          content:
            application/json:
              schema:
                type: object
                required: [ok, count, results]
                properties:
                  ok:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 5
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        scenario:  { type: string }
                        category:  { type: string, enum: [app, resource] }
                        generated: { type: object, additionalProperties: true }
                        stored:    { $ref: '#/components/schemas/StoredRef' }

  # ── Query ─────────────────────────────────────────────────────────────────

  /api/query:
    get:
      tags: [query]
      summary: Query log entries by time range
      description: |
        Retrieves stored log entries filtered by any combination of time range,
        level, category, scenario, and free-text search. Results are paginated.

        **Time range defaults:** if `from` is omitted the store returns all entries
        from the beginning; `to` defaults to now.
      operationId: queryLogs
      parameters:
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/level'
        - $ref: '#/components/parameters/category'
        - $ref: '#/components/parameters/scenario'
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/order'
      responses:
        '200':
          description: Query results
          content:
            application/json:
              schema:
                type: object
                required: [ok, total, offset, limit, count, entries]
                properties:
                  ok:
                    type: boolean
                    example: true
                  total:
                    type: integer
                    description: Total matching entries before pagination
                    example: 87
                  offset:
                    type: integer
                    example: 0
                  limit:
                    type: integer
                    example: 200
                  count:
                    type: integer
                    description: Entries returned in this page
                    example: 87
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/LogEntry'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/query/stats:
    get:
      tags: [query]
      summary: Aggregated counts for a time range
      description: |
        Returns total event counts grouped by level, category, and scenario
        for the specified time window. Useful for dashboards and alerting.
      operationId: queryStats
      parameters:
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
      responses:
        '200':
          description: Aggregated statistics
          content:
            application/json:
              schema:
                type: object
                required: [ok, total, byLevel, byCategory, byScenario]
                properties:
                  ok:
                    type: boolean
                    example: true
                  total:
                    type: integer
                    example: 42
                  from:
                    type: string
                    format: date-time
                    nullable: true
                  to:
                    type: string
                    format: date-time
                  byLevel:
                    type: object
                    additionalProperties: { type: integer }
                    example: { ERROR: 18, WARN: 14, INFO: 8, CRITICAL: 2 }
                  byCategory:
                    type: object
                    additionalProperties: { type: integer }
                    example: { APP: 28, RESOURCE: 14 }
                  byScenario:
                    type: object
                    additionalProperties: { type: integer }
                    example: { db_down: 5, auth_error: 4, high_cpu: 3 }
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/query/timeseries:
    get:
      tags: [query]
      summary: Time-series bucket counts
      description: |
        Splits the time range into equal-sized buckets and returns per-level
        counts for each bucket. Designed to feed directly into charting libraries
        (Recharts, Chart.js, Grafana, etc.).
      operationId: queryTimeseries
      parameters:
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - name: bucket
          in: query
          description: Bucket size in seconds. Minimum 1.
          schema:
            type: integer
            default: 60
            minimum: 1
            example: 300
      responses:
        '200':
          description: Time-series data
          content:
            application/json:
              schema:
                type: object
                required: [ok, bucketSec, count, series]
                properties:
                  ok:
                    type: boolean
                    example: true
                  bucketSec:
                    type: integer
                    description: Bucket width in seconds
                    example: 60
                  count:
                    type: integer
                    description: Number of buckets returned
                    example: 60
                  series:
                    type: array
                    items:
                      type: object
                      required: [ts, total]
                      properties:
                        ts:       { type: string, format: date-time }
                        total:    { type: integer, example: 7 }
                        INFO:     { type: integer, example: 2 }
                        WARN:     { type: integer, example: 3 }
                        ERROR:    { type: integer, example: 2 }
                        CRITICAL: { type: integer, example: 0 }
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/query/store:
    get:
      tags: [query]
      summary: Store metadata
      description: Returns the current store size, capacity, and timestamp bounds.
      operationId: getStore
      responses:
        '200':
          description: Store info
          content:
            application/json:
              schema:
                type: object
                required: [ok, size, maxEntries]
                properties:
                  ok:         { type: boolean, example: true }
                  size:       { type: integer, example: 142 }
                  maxEntries: { type: integer, example: 10000 }
                  oldest:
                    type: string
                    format: date-time
                    nullable: true
                    example: "2024-01-15T09:00:00.000Z"
                  newest:
                    type: string
                    format: date-time
                    nullable: true
                    example: "2024-01-15T10:30:00.000Z"

    delete:
      tags: [query]
      summary: Clear the store
      description: Deletes all entries from the in-memory store. Cannot be undone.
      operationId: clearStore
      responses:
        '200':
          description: Store cleared
          content:
            application/json:
              schema:
                type: object
                required: [ok, cleared]
                properties:
                  ok:      { type: boolean, example: true }
                  cleared: { type: integer, description: Number of entries deleted, example: 142 }
